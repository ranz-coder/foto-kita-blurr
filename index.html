<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRUTAL LIVE PHOTO GESTURE</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        /* --- NEO-BRUTALISM UI STYLE --- */
        :root {
            --bg-color: #ffe600;
            --primary-color: #000000;
            --accent-lawan: #ff3333;
            --accent-blur: #00e5ff;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial Black', Impact, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--primary-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            border: 8px solid var(--primary-color);
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            background: #fff;
            padding: 15px;
            border: 4px solid var(--primary-color);
            box-shadow: 8px 8px 0px var(--primary-color);
            transform: rotate(-1deg);
        }

        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        /* Container Utama */
        .main-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
            margin-top: 20px;
        }

        /* Panel Info / Cara Pakai */
        .info-panel {
            background: #fff;
            border: 4px solid var(--primary-color);
            box-shadow: 8px 8px 0px var(--primary-color);
            padding: 20px;
            flex: 1;
            min-width: 300px;
        }

        .info-panel h2 {
            border-bottom: 4px solid var(--primary-color);
            padding-bottom: 5px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .info-panel ul {
            list-style: none;
        }

        .info-panel li {
            margin-bottom: 12px;
            padding: 10px;
            border: 2px solid var(--primary-color);
            background: #f0f0f0;
            font-weight: bold;
        }

        /* Frame Foto / Kamera */
        .photo-frame-wrapper {
            position: relative;
            flex: 1;
            min-width: 340px;
            max-width: 500px;
        }

        .photo-frame {
            position: relative;
            background: var(--card-bg);
            border: 6px solid var(--primary-color);
            box-shadow: 12px 12px 0px var(--primary-color);
            aspect-ratio: 4/3;
            overflow: hidden;
            transition: all 0.1s ease;
        }

        /* State Modifiers via JS */
        .photo-frame.state-blur {
            filter: blur(8px);
            border-color: var(--accent-blur);
            box-shadow: 12px 12px 0px var(--accent-blur);
            transform: scale(0.98);
        }

        .photo-frame.state-lawan {
            animation: shake 0.15s infinite, flash-border 0.3s infinite;
            box-shadow: 12px 12px 0px var(--accent-lawan);
        }

        /* Video / Output Kamera */
        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror effect */
        }

        /* Status Banner */
        .status-banner {
            margin-top: 15px;
            background: #fff;
            border: 4px solid var(--primary-color);
            padding: 10px;
            text-align: center;
            font-size: 1.5rem;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px var(--primary-color);
        }

        /* Efek Partikel Emoji */
        .particle {
            position: fixed;
            pointer-events: none;
            font-size: 2rem;
            z-index: 999;
            animation: flyUp 1s ease-out forwards;
        }

        /* --- ANIMASI --- */
        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        @keyframes flash-border {
            0%, 100% { border-color: var(--primary-color); }
            50% { border-color: var(--accent-lawan); }
        }

        @keyframes flyUp {
            0% {
                transform: translateY(0) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-200px) scale(1.5) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>GESTURE CONTROL : BRUTAL EDITION</h1>
    </header>

    <div class="main-container">
        <div class="info-panel">
            <h2>CARA PAKAI 🎯</h2>
            <ul>
                <li style="background: #5eff5e;">✋ 5 JARI: Mode Normal (Foto Jelas)</li>
                <li style="background: var(--accent-blur);">✌️ 2 JARI: Mode BLUR + Emoji 😆 Berhamburan</li>
                <li style="background: var(--accent-lawan); color: white;">✊ MENGEPAL: Mode LAWAN! 🔥 + Efek Api Bergetar</li>
            </ul>
            <p style="margin-top: 15px; font-size: 0.9rem;">*Izinkan akses kamera dan lakukan gestur dengan jelas di depan lensa.</p>
        </div>

        <div class="photo-frame-wrapper">
            <div class="photo-frame" id="photoFrame">
                <video id="webcam" autoplay playsinline></video>
            </div>
            <div class="status-banner" id="statusText">Mendeteksi Kamera...</div>
        </div>
    </div>

    <audio id="audioLawan" src="https://cdn.ranzzawok.my.id/media/music/med_6cae0737736f3f08.mp3" loop></audio>
    <audio id="audioBlur" src="https://cdn.ranzzawok.my.id/media/music/med_8b7250a727afaac0.mp3" loop></audio>

    <script>
        const videoElement = document.getElementById('webcam');
        const photoFrame = document.getElementById('photoFrame');
        const statusText = document.getElementById('statusText');
        const audioLawan = document.getElementById('audioLawan');
        const audioBlur = document.getElementById('audioBlur');

        let currentMode = 'normal';

        // Fungsi Spawn Partikel Emoji Berhamburan
        function spawnParticles(emoji) {
            const frameRect = photoFrame.getBoundingClientRect();
            for (let i = 0; i < 5; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.innerText = emoji;
                
                // Atur posisi acak di dalam area frame foto
                const randomX = frameRect.left + Math.random() * frameRect.width;
                const randomY = frameRect.top + Math.random() * frameRect.height;
                
                particle.style.left = `${randomX}px`;
                particle.style.top = `${randomY}px`;
                
                document.body.appendChild(particle);
                
                // Hapus element setelah animasi selesai
                setTimeout(() => particle.remove(), 1000);
            }
        }

        // Pengatur Suara Aman (Autoplay policy browser bypass)
        function playSound(audioToPlay, audioToStop) {
            audioToStop.pause();
            audioToStop.currentTime = 0;
            if (audioToPlay.paused) {
                audioToPlay.play().catch(e => console.log("User gesture required first"));
            }
        }

        function stopAllSound() {
            audioLawan.pause();
            audioBlur.pause();
        }

        // Handle Hasil Deteksi Gestur Tangan
        function onResults(results) {
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                // Jika tidak ada tangan terdeteksi, reset ke normal secara pelan
                updateState('normal');
                return;
            }

            const landmarks = results.multiHandLandmarks[0];

            // Deteksi jari terbuka berdasarkan tinggi Landmark ujung jari dibanding sendinya
            // Tips: Y-axis MediaPipe mengarah ke bawah, jadi < berarti lebih tinggi di layar.
            const thumbOpen = landmarks[4].x < landmarks[3].x; // Untuk tangan kanan (bisa bervariasi)
            const indexOpen = landmarks[8].y < landmarks[6].y;
            const middleOpen = landmarks[12].y < landmarks[10].y;
            const ringOpen = landmarks[16].y < landmarks[14].y;
            const pinkyOpen = landmarks[20].y < landmarks[18].y;

            // Hitung total jari yang terangkat (selain jempol untuk akurasi simple)
            const openedFingers = [indexOpen, middleOpen, ringOpen, pinkyOpen].filter(Boolean).length;

            // Menentukan Mode berdasarkan jumlah jari aktif
            if (openedFingers === 4) { 
                // Semua jari buka (5 Jari)
                updateState('normal');
            } else if (indexOpen && middleOpen && !ringOpen && !pinkyOpen) {
                // Hanya telunjuk dan tengah (2 Jari / Peace)
                updateState('blur');
            } else if (!indexOpen && !middleOpen && !ringOpen && !pinkyOpen) {
                // Semua jari menutup (Mengepal)
                updateState('lawan');
            }
        }

        // Fungsi Perubahan State UI dan Audio
        function updateState(mode) {
            if (currentMode === mode) {
                // Jika sedang di mode tersebut, terus keluarkan partikel
                if (mode === 'blur') spawnParticles('😆');
                if (mode === 'lawan') spawnParticles('🔥');
                return;
            }
            
            currentMode = mode;

            // Reset Class
            photoFrame.className = 'photo-frame';

            if (mode === 'normal') {
                statusText.innerText = "✋ NORMAL MODE";
                statusText.style.background = "#5eff5e";
                stopAllSound();
            } 
            else if (mode === 'blur') {
                statusText.innerText = "✌️ BLUR MODE! 😆";
                statusText.style.background = "var(--accent-blur)";
                photoFrame.classList.add('state-blur');
                playSound(audioBlur, audioLawan);
            } 
            else if (mode === 'lawan') {
                statusText.innerText = "✊ LAWAN!!! 🔥🔥🔥";
                statusText.style.background = "var(--accent-lawan)";
                photoFrame.classList.add('state-lawan');
                playSound(audioLawan, audioBlur);
            }
        }

        // Inisialisasi MediaPipe Hands
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        // Menjalankan Kamera bawaan perangkat
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        
        camera.start().then(() => {
            statusText.innerText = "✋ Kamera Siap! Silahkan Bergaya";
        }).catch(err => {
            statusText.innerText = "Gagal mengakses Kamera ❌";
            console.error(err);
        });
    </script>
</body>
</html>
